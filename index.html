<!DOCTYPE html>
<html>
<head>
<title>AI Skill Gap Analyzer</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right,#667eea,#764ba2);
    text-align:center;
    color:white;
}
.box{
    background:white;
    color:black;
    width:80%;
    margin:40px auto;
    padding:25px;
    border-radius:15px;
}
input,select,textarea{
    width:80%;
    padding:10px;
    margin:10px;
}
button{
    padding:10px 20px;
    background:#667eea;
    color:white;
    border:none;
    border-radius:8px;
}
.hidden{display:none;}
</style>
</head>

<body>

<!-- 🟦 PAGE 1 -->
<div class="box" id="p1">
<h2>AI Skill Gap Analyzer 🚀</h2>

<input id="name" placeholder="Enter Name">
<input id="skills" placeholder="Enter Skills (battery, python)">
<select id="field">
<option value="ev">EV Ecosystem</option>
<option value="auto">Automotive Manufacturing</option>
</select>

<br>
<button onclick="start()">Start Test</button>
</div>

<!-- 🟨 PAGE 2 -->
<div class="box hidden" id="p2">
<h2>Scenario Test 🧠</h2>
<p id="q"></p>
<h3>⏳ <span id="t">30</span>s</h3>
<textarea id="ans"></textarea>
<br>
<button onclick="submitTest()">Submit</button>
</div>

<!-- 🟥 PAGE 3 -->
<div class="box hidden" id="p3">
<h2>Final Score 📊</h2>
<h3 id="score"></h3>
<p id="msg"></p>

<button onclick="nextPage()">View Recommendations ➡</button>
</div>

<!-- 🟩 PAGE 4 -->
<div class="box hidden" id="p4">
<h2>Recommendations 🎯</h2>

<h4>Missing Skills</h4>
<p id="missing"></p>

<h4>Recommended Skills</h4>
<p id="rec"></p>

<h4>Learning Links</h4>
<p id="links"></p>

<h4>Career Roles</h4>
<p id="roles"></p>

<h4>Companies</h4>
<p id="companies"></p>
</div>

<script>

let time=30, timer, cheat=0;
let field="", missing=[] , finalScore=0;

// Anti cheat
document.addEventListener("copy",e=>e.preventDefault());
document.addEventListener("paste",e=>e.preventDefault());
document.addEventListener("contextmenu",e=>e.preventDefault());

document.addEventListener("visibilitychange",()=>{
 if(document.hidden){
   cheat++;
   alert("⚠ Tab switch detected!");
 }
});

// START
function start(){

 let skills=document.getElementById("skills").value.toLowerCase().split(",");
 field=document.getElementById("field").value;

 let req = field=="ev"
 ? ["battery","bms","electronics","ev design","python"]
 : ["cad","manufacturing","mechanics","design","automation"];

 missing = req.filter(s=>!skills.includes(s));

 document.getElementById("q").innerText =
 field=="ev"
 ? "How will you improve EV battery efficiency?"
 : "How will you improve manufacturing efficiency?";

 document.getElementById("p1").classList.add("hidden");
 document.getElementById("p2").classList.remove("hidden");

 timer=setInterval(()=>{
   time--;
   document.getElementById("t").innerText=time;
   if(time<=0) submitTest();
 },1000);
}

// SUBMIT
function submitTest(){

 clearInterval(timer);

 let ans=document.getElementById("ans").value;
 let sc = ans.length>50 ? 50 : ans.length>20 ? 30 : 10;

 sc -= cheat*5;

 let base = Math.max(0,50 - missing.length*10);

 finalScore = Math.max(0, base + sc);

 document.getElementById("p2").classList.add("hidden");
 document.getElementById("p3").classList.remove("hidden");

 document.getElementById("score").innerText = finalScore+"%";

 let m = finalScore>=80
 ? "🔥 READY for Industry"
 : finalScore>=50
 ? "⚡ Improve some skills"
 : "❌ Not ready";

 document.getElementById("msg").innerText = m;
}

// NEXT PAGE
function nextPage(){

 document.getElementById("p3").classList.add("hidden");
 document.getElementById("p4").classList.remove("hidden");

 // Recommended skills
 let recSkills = finalScore>=80
 ? ["Advanced Skills","AI","Automation"]
 : finalScore>=50
 ? ["Intermediate Skills","Core Concepts"]
 : ["Basics","Fundamentals"];

 // Links
 let links = field=="ev"
 ? ["EV Basics","Battery Tech","BMS"]
 : ["CAD","Manufacturing","Design"];

 // Roles
 let roles = field=="ev"
 ? ["EV Engineer","Battery Engineer"]
 : ["Design Engineer","Production Engineer"];

 // Companies
 let companies = finalScore>=80
 ? (field=="ev" ? ["Tesla","Ather","Ola"] : ["Tata","Mahindra"])
 : finalScore>=50
 ? ["Mid-level Companies"]
 : ["Internships"];

 document.getElementById("missing").innerText = missing.join(", ");
 document.getElementById("rec").innerText = recSkills.join(", ");
 document.getElementById("links").innerText = links.join(", ");
 document.getElementById("roles").innerText = roles.join(", ");
 document.getElementById("companies").innerText = companies.join(", ");
}

</script>

</body>
</html>
