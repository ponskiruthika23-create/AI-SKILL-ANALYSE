<!DOCTYPE html>
<html>
<head>
    <title>AI-Powered Skill Gap Analyzer</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(to right, #667eea, #764ba2);
            text-align: center;
            color: white;
        }

        .box {
            background: white;
            color: black;
            width: 80%;
            margin: 40px auto;
            padding: 25px;
            border-radius: 15px;
        }

        input, select, textarea {
            width: 80%;
            padding: 12px;
            margin: 10px;
            border-radius: 8px;
        }

        button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .hidden { display:none; }

        .score {
            font-size: 30px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<!-- 🟦 SLIDE 1 -->
<div class="box" id="page1">
    <h2>AI Skill Gap Analyzer 🚀</h2>

    <input id="name" placeholder="Enter Your Name">
    <input id="skills" placeholder="Enter Skills (battery, python)">
    
    <select id="field">
        <option value="ev">EV Ecosystem</option>
        <option value="auto">Automotive Manufacturing</option>
    </select>

    <br>
    <button onclick="startTest()">Start Test</button>
</div>

<!-- 🟨 SLIDE 2 -->
<div class="box hidden" id="page2">
    <h2>Scenario Test 🧠</h2>

    <p id="question"></p>

    <h3>⏳ <span id="timer">30</span>s</h3>

    <textarea id="answer" placeholder="Type answer..."></textarea>

    <br>
    <button onclick="submitTest()">Submit</button>
</div>

<!-- 🟥 SLIDE 3 -->
<div class="box hidden" id="page3">
    <h2>Final Result 📊</h2>

    <div class="score" id="score"></div>
    <p id="status"></p>
</div>

<script>

let time = 30, timer, cheat = 0, base = 0, field="";

// 🚫 Anti-cheat
document.addEventListener("copy", e => e.preventDefault());
document.addEventListener("paste", e => e.preventDefault());
document.addEventListener("contextmenu", e => e.preventDefault());

document.addEventListener("visibilitychange", () => {
    if(document.hidden){
        cheat++;
        alert("⚠ Tab switch detected!");
    }
});

// ▶ Start Test
function startTest(){

    let skills = document.getElementById("skills").value.toLowerCase().split(",");
    field = document.getElementById("field").value;

    let req = field==="ev"
        ? ["battery","bms","electronics","ev design","python"]
        : ["cad","manufacturing","mechanics","design","automation"];

    let miss = req.filter(s=>!skills.includes(s));
    base = Math.max(0,50 - miss.length*10);

    // Question
    document.getElementById("question").innerText =
        field==="ev"
        ? "How will you improve EV battery efficiency?"
        : "How will you improve manufacturing efficiency?";

    document.getElementById("page1").classList.add("hidden");
    document.getElementById("page2").classList.remove("hidden");

    timer = setInterval(()=>{
        time--;
        document.getElementById("timer").innerText = time;

        if(time<=0) submitTest();
    },1000);
}

// ▶ Submit
function submitTest(){

    clearInterval(timer);

    let ans = document.getElementById("answer").value;

    let sc = ans.length>50 ? 50 : ans.length>20 ? 30 : 10;

    sc -= cheat*5;

    let final = Math.max(0, base + sc);

    document.getElementById("page2").classList.add("hidden");
    document.getElementById("page3").classList.remove("hidden");

    document.getElementById("score").innerText = final + "%";

    let msg = final>=80
        ? "🔥 You are READY for Industry!"
        : final>=50
        ? "⚡ You need some improvement in core skills."
        : "❌ You need strong basics.";

    document.getElementById("status").innerText =
        msg + " | Score based on real-time performance.";
}

</script>

</body>
</html>
